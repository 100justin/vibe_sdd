openapi: 3.0.3
info:
  title: Todo API
  version: 1.0.0
paths:
  /api/todos:
    get:
      summary: 할 일 목록 조회
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [all, active, completed]
          required: false
      responses:
        '200':
          description: 할 일 목록 반환
    post:
      summary: 할 일 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
              required:
                - title
      responses:
        '201':
          description: 생성 성공
        '422':
          description: 제목이 비어 있음
  /api/todos/{id}:
    patch:
      summary: 할 일 완료 상태 토글
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                completed:
                  type: boolean
      responses:
        '200':
          description: 수정 성공
        '404':
          description: 해당 할 일을 찾을 수 없음
    delete:
      summary: 할 일 삭제
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: 삭제 성공
        '404':
          description: 해당 할 일을 찾을 수 없음
  /:
    get:
      summary: 메인 페이지
      responses:
        '200':
          description: HTML 페이지 반환
  /health:
    get:
      summary: 상태 확인
      responses:
        '200':
          description: 정상 상태
